server:
  port: 8084

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:postgresql://localhost:5432/zoo_booking_db
    username: zoo_admin
    password: ${DB_PASSWORD:zoo_password}
    driver-class-name: org.postgresql.Driver
  
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  jwt:
    secret: ${JWT_SECRET:ZooIdentitySecretKey2026!@#DynamicRBAC_Security}
  services:
    identity:
      name: identity-service
    inventory:
      name: inventory-service
    pricing:
      name: pricing-service
    notification:
      name: notification-service

logging:
  level:
    com.zoo.booking: DEBUG
    org.springframework.jdbc.core.NamedParameterJdbcTemplate: DEBUG
