version: '3.8'
services:
  db:
    image: postgres:15
    container_name: zoo_postgres
    environment:
      POSTGRES_USER: zoo_admin
      POSTGRES_PASSWORD: zoo_password
      POSTGRES_DB: zoo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
